name: Deploy website to S3 and CloudFront

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-company-website
  cancel-in-progress: true

env:
  VITE_GRAPHQL_ENDPOINT: https://lms-api.itdinvestech.co.za/graphql/

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production site
        run: npm run build:production

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3
        run: |
          BUCKET="${{ secrets.WEBSITE_S3_BUCKET || secrets.S3_BUCKET }}"
          if [ -z "${BUCKET:-}" ]; then
            echo "::error::Set GitHub secret WEBSITE_S3_BUCKET (or S3_BUCKET) to your company website bucket."
            exit 1
          fi

          aws s3 sync dist/ "s3://${BUCKET}/" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "vite.svg" \
            --exclude "favicon.svg" \
            --exclude "logo.svg"

          aws s3 cp dist/index.html "s3://${BUCKET}/index.html" \
            --cache-control "public,max-age=0,must-revalidate" \
            --content-type "text/html"

          if [ -f dist/vite.svg ]; then
            aws s3 cp dist/vite.svg "s3://${BUCKET}/vite.svg" \
              --cache-control "public,max-age=0,must-revalidate" \
              --content-type "image/svg+xml"
          fi

          # Remove assets from the polished UI deploy so browsers cannot keep using them.
          aws s3 rm "s3://${BUCKET}/favicon.svg" || true
          aws s3 rm "s3://${BUCKET}/logo.svg" || true

      - name: Invalidate CloudFront cache
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.WEBSITE_CLOUDFRONT_DISTRIBUTION_ID || secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          if [ -z "${CLOUDFRONT_DISTRIBUTION_ID:-}" ]; then
            echo "WEBSITE_CLOUDFRONT_DISTRIBUTION_ID not set — skipping cache invalidation."
            exit 0
          fi

          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"
          echo "CloudFront invalidation submitted."
